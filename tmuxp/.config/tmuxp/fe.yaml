# Standalone frontend project layout (vue/react/etc.).
# Loaded by `t` with TP_SESSION and TP_DIR set.
#
# Pinned windows (&pinned anchor): fixed name + rename opts off so the
# status line shows the window name instead of the running command.
session_name: ${TP_SESSION}
start_directory: ${TP_DIR}
windows:
  - window_name: nvim
    focus: true
    panes:
      - nvim
  - window_name: claude
    options: &pinned
      automatic-rename: 'off'
      allow-rename: 'off'
      '@pinned': 'on'
    panes:
      - claude
  - window_name: node
    options: *pinned
    panes:
      - shell_command:
          - cmd: npm run dev
            enter: false
  - window_name: term
    panes:
      - blank
